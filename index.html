<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
.calculator{width:100%;max-width:400px;padding:15px;height:100vh;display:flex;flex-direction:column;justify-content:flex-end}
.display{padding:15px 10px;text-align:right;margin-bottom:10px;min-height:120px;display:flex;flex-direction:column;justify-content:flex-end}
.expression{color:#7c83a0;font-size:0.95rem;min-height:22px;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result{color:#e8eaf6;font-size:3.5rem;font-weight:300;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scientific-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
button{height:68px;border:none;border-radius:20px;font-size:1.2rem;font-weight:400;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px}
button:active{transform:scale(0.93);opacity:0.85}
.btn-sci{background:#16213e;color:#a0a8c8;font-size:0.95rem}
.btn-sci:hover{background:#1f2d4a}
.btn-clear{background:#3d2b6b;color:#c084fc}
.btn-special{background:#16213e;color:#a0a8c8}
.btn-operator{background:#16213e;color:#818cf8}
.btn-operator:hover{background:#1e2a5e}
.btn-number{background:#0f3460;color:#e8eaf6}
.btn-number:hover{background:#164080}
.btn-zero{border-radius:20px}
.btn-equals{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:1.4rem}
.btn-equals:hover{background:linear-gradient(135deg,#7c3aed,#6366f1)}
.btn-backspace{background:#16213e;color:#f472b6;font-size:1rem}
</style>
</head>
<body>
<div class="calculator">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <!-- Scientific Row -->
  <div class="scientific-row">
    <button class="btn-sci" onclick="appendSci('Math.sqrt(')">√</button>
    <button class="btn-sci" onclick="appendVal('Math.PI')">π</button>
    <button class="btn-sci" onclick="appendVal('^')">^</button>
    <button class="btn-sci" onclick="appendSci('factorial(')">n!</button>
    <button class="btn-sci" onclick="appendSci('Math.sin(')">sin</button>
    <button class="btn-sci" onclick="appendSci('Math.cos(')">cos</button>
    <button class="btn-sci" onclick="appendSci('Math.tan(')">tan</button>
    <button class="btn-sci" onclick="appendSci('Math.log10(')">log</button>
    <button class="btn-sci" onclick="appendSci('Math.log(')">ln</button>
    <button class="btn-sci" onclick="appendVal('Math.E')">e</button>
    <button class="btn-sci" onclick="appendVal('(')">(</button>
    <button class="btn-sci" onclick="appendVal(')')">)</button>
  </div>

  <!-- Main Buttons -->
  <div class="buttons">
    <button class="btn-clear" id="acBtn" onclick="clearAll()">AC</button>
    <button class="btn-special" onclick="toggleSign()">+/−</button>
    <button class="btn-special" onclick="percentage()">%</button>
    <button class="btn-operator" onclick="appendOp('/')">÷</button>

    <button class="btn-number" onclick="appendNum('7')">7</button>
    <button class="btn-number" onclick="appendNum('8')">8</button>
    <button class="btn-number" onclick="appendNum('9')">9</button>
    <button class="btn-operator" onclick="appendOp('*')">×</button>

    <button class="btn-number" onclick="appendNum('4')">4</button>
    <button class="btn-number" onclick="appendNum('5')">5</button>
    <button class="btn-number" onclick="appendNum('6')">6</button>
    <button class="btn-operator" onclick="appendOp('-')">−</button>

    <button class="btn-number" onclick="appendNum('1')">1</button>
    <button class="btn-number" onclick="appendNum('2')">2</button>
    <button class="btn-number" onclick="appendNum('3')">3</button>
    <button class="btn-operator" onclick="appendOp('+')">+</button>

    <button class="btn-number btn-zero" onclick="appendNum('0')">0</button>
    <button class="btn-number" onclick="appendDot()">.</button>
    <button class="btn-backspace" onclick="deleteLast()">⌫</button>
    <button class="btn-equals" onclick="calculate()">=</button>
  </div>
</div>
<script>
let expr='';
let justCalc=false;

function updateDisplay(val){
document.getElementById('result').textContent=val||'0';
document.getElementById('acBtn').textContent=(expr===''||expr==='0')?'AC':'C';
}

function appendNum(n){
if(justCalc){expr='';justCalc=false}
if(expr==='0')expr=n;
else expr+=n;
updateDisplay(expr);
}

function appendDot(){
if(justCalc){expr='0';justCalc=false}
const parts=expr.split(/[\+\-\*\/]/);
const last=parts[parts.length-1];
if(!last.includes('.'))expr+='.';
updateDisplay(expr);
}

function appendOp(op){
justCalc=false;
if(expr===''&&op==='-'){expr='-';updateDisplay(expr);return}
if(expr==='')return;
const last=expr.slice(-1);
if(['+','-','*','/'].includes(last))expr=expr.slice(0,-1);
expr+=op;
updateDisplay(expr);
}

function appendSci(fn){
if(justCalc){expr='';justCalc=false}
expr+=fn;
updateDisplay(expr);
}

function appendVal(val){
if(justCalc){expr='';justCalc=false}
if(val==='Math.PI')expr+=Math.PI;
else if(val==='Math.E')expr+=Math.E;
else if(val==='^')expr+='**';
else expr+=val;
updateDisplay(expr);
}

function clearAll(){
expr='';justCalc=false;
document.getElementById('expression').textContent='';
updateDisplay('0');
}

function deleteLast(){
if(justCalc){expr='';justCalc=false;updateDisplay('0');return}
expr=expr.slice(0,-1);
updateDisplay(expr||'0');
}

function toggleSign(){
if(!expr||expr==='0')return;
if(expr.startsWith('-'))expr=expr.slice(1);
else expr='-'+expr;
updateDisplay(expr);
}

function percentage(){
try{
const val=parseFloat(eval(expr));
expr=String(val/100);
updateDisplay(expr);
}catch(e){}
}

function factorial(n){
n=Math.floor(n);
if(n<0)return NaN;
if(n===0||n===1)return 1;
let r=1;
for(let i=2;i<=n;i++)r*=i;
return r;
}

function calculate(){
if(!expr)return;
try{
document.getElementById('expression').textContent=expr.replace(/\*\*/g,'^').replace(/Math\.sqrt/g,'√').replace(/Math\.sin/g,'sin').replace(/Math\.cos/g,'cos').replace(/Math\.tan/g,'tan').replace(/Math\.log10/g,'log').replace(/Math\.log/g,'ln').replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e')+'=';
const result=eval(expr);
const formatted=parseFloat(result.toFixed(10));
expr=String(formatted);
updateDisplay(formatted);
justCalc=true;
}catch(e){
updateDisplay('Error');
expr='';
}
}

document.addEventListener('keydown',e=>{
if(e.key>='0'&&e.key<='9')appendNum(e.key);
else if(e.key==='.')appendDot();
else if(e.key==='+'||e.key==='-'||e.key==='*'||e.key==='/')appendOp(e.key);
else if(e.key==='Enter'||e.key==='=')calculate();
else if(e.key==='Backspace')deleteLast();
else if(e.key==='Escape')clearAll();
});
</script>
</body>
</html>
