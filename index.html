<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#0d0d0d;display:flex;justify-content:center;align-items:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.calculator{width:100vw;height:100vh;max-width:420px;display:flex;flex-direction:column;padding:10px 12px;gap:6px}
.display{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 8px;min-height:0}
.expression{color:#6b6b6b;font-size:0.85rem;text-align:right;min-height:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.result{color:#fff;font-size:3rem;font-weight:300;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.1}
.sci-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.main-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
button{height:62px;border:none;border-radius:16px;font-size:1.1rem;font-weight:500;cursor:pointer;transition:transform 0.1s,opacity 0.1s}
button:active{transform:scale(0.92);opacity:0.75}
.btn-sci{background:#1c1c1c;color:#c084fc;font-size:0.9rem}
.btn-clear{background:#2d1f2e;color:#f472b6;font-weight:600}
.btn-special{background:#1c1c1c;color:#e879f9}
.btn-operator{background:#1c1c1c;color:#f9a8d4}
.btn-number{background:#1a1a1a;color:#f1f5f9}
.btn-backspace{background:#1c1c1c;color:#f472b6}
.btn-equals{background:linear-gradient(135deg,#f472b6,#ec4899);color:#fff;font-size:1.3rem;font-weight:600;box-shadow:0 4px 15px rgba(244,114,182,0.4)}
</style>
</head>
<body>
<div class="calculator">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="sci-grid">
    <button class="btn-sci" onclick="appendSci('Math.sqrt(')">√</button>
    <button class="btn-sci" onclick="appendVal('Math.PI')">π</button>
    <button class="btn-sci" onclick="appendVal('^')">^</button>
    <button class="btn-sci" onclick="appendSci('factorial(')">n!</button>
    <button class="btn-sci" onclick="appendSci('Math.sin(')">sin</button>
    <button class="btn-sci" onclick="appendSci('Math.cos(')">cos</button>
    <button class="btn-sci" onclick="appendSci('Math.tan(')">tan</button>
    <button class="btn-sci" onclick="appendSci('Math.log10(')">log</button>
    <button class="btn-sci" onclick="appendSci('Math.log(')">ln</button>
    <button class="btn-sci" onclick="appendVal('Math.E')">e</button>
    <button class="btn-sci" onclick="appendVal('(')">(</button>
    <button class="btn-sci" onclick="appendVal(')')">)</button>
  </div>
  <div class="main-grid">
    <button class="btn-clear" id="acBtn" onclick="clearAll()">AC</button>
    <button class="btn-special" onclick="toggleSign()">+/−</button>
    <button class="btn-special" onclick="percentage()">%</button>
    <button class="btn-operator" onclick="appendOp('/')">÷</button>
    <button class="btn-number" onclick="appendNum('7')">7</button>
    <button class="btn-number" onclick="appendNum('8')">8</button>
    <button class="btn-number" onclick="appendNum('9')">9</button>
    <button class="btn-operator" onclick="appendOp('*')">×</button>
    <button class="btn-number" onclick="appendNum('4')">4</button>
    <button class="btn-number" onclick="appendNum('5')">5</button>
    <button class="btn-number" onclick="appendNum('6')">6</button>
    <button class="btn-operator" onclick="appendOp('-')">−</button>
    <button class="btn-number" onclick="appendNum('1')">1</button>
    <button class="btn-number" onclick="appendNum('2')">2</button>
    <button class="btn-number" onclick="appendNum('3')">3</button>
    <button class="btn-operator" onclick="appendOp('+')">+</button>
    <button class="btn-number" onclick="appendNum('0')">0</button>
    <button class="btn-number" onclick="appendDot()">.</button>
    <button class="btn-backspace" onclick="deleteLast()">⌫</button>
    <button class="btn-equals" onclick="calculate()">=</button>
  </div>
</div>
<script>
let expr='';
let justCalc=false;

function updateDisplay(val){
document.getElementById('result').textContent=val||'0';
document.getElementById('acBtn').textContent=(expr==='')?'AC':'C';
}

function appendNum(n){
if(justCalc){expr='';justCalc=false}
if(expr==='0')expr=n;
else expr+=n;
updateDisplay(expr);
}

function appendDot(){
if(justCalc){expr='0';justCalc=false}
const parts=expr.split(/[\+\-\*\/]/);
const last=parts[parts.length-1];
if(!last.includes('.'))expr+='.';
updateDisplay(expr);
}

function appendOp(op){
justCalc=false;
if(expr===''&&op==='-'){expr='-';updateDisplay(expr);return}
if(expr==='')return;
const last=expr.slice(-1);
if(['+','-','*','/'].includes(last))expr=expr.slice(0,-1);
expr+=op;
updateDisplay(expr);
}

function appendSci(fn){
if(justCalc){expr='';justCalc=false}
expr+=fn;
updateDisplay(expr);
}

function appendVal(val){
if(justCalc){expr='';justCalc=false}
if(val==='Math.PI')expr+=Math.PI;
else if(val==='Math.E')expr+=Math.E;
else if(val==='^')expr+='**';
else expr+=val;
updateDisplay(expr);
}

function clearAll(){
expr='';justCalc=false;
document.getElementById('expression').textContent='';
updateDisplay('0');
}

function deleteLast(){
if(justCalc){expr='';justCalc=false;updateDisplay('0');return}
expr=expr.slice(0,-1);
updateDisplay(expr||'0');
}

function toggleSign(){
if(!expr||expr==='0')return;
if(expr.startsWith('-'))expr=expr.slice(1);
else expr='-'+expr;
updateDisplay(expr);
}

function percentage(){
try{
const val=parseFloat(eval(expr));
expr=String(val/100);
updateDisplay(expr);
}catch(e){}
}

function factorial(n){
n=Math.floor(n);
if(n<0||n>170)return NaN;
if(n===0||n===1)return 1;
let r=1;
for(let i=2;i<=n;i++)r*=i;
return r;
}

function calculate(){
if(!expr)return;
try{
const dispExpr=expr.replace(/\*\*/g,'^').replace(/Math\.sqrt/g,'√').replace(/Math\.sin/g,'sin').replace(/Math\.cos/g,'cos').replace(/Math\.tan/g,'tan').replace(/Math\.log10/g,'log').replace(/Math\.log/g,'ln').replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e');
document.getElementById('expression').textContent=dispExpr+'=';
const result=Function('"use strict";const factorial='+factorial.toString()+';return ('+expr+')')();
const formatted=parseFloat(result.toFixed(10));
expr=String(formatted);
updateDisplay(formatted);
justCalc=true;
}catch(e){
updateDisplay('Error');
expr='';
}
}

document.addEventListener('keydown',e=>{
if(e.key>='0'&&e.key<='9')appendNum(e.key);
else if(e.key==='.')appendDot();
else if(e.key==='+'||e.key==='-'||e.key==='*'||e.key==='/')appendOp(e.key);
else if(e.key==='Enter'||e.key==='=')calculate();
else if(e.key==='Backspace')deleteLast();
else if(e.key==='Escape')clearAll();
});
</script>
</body>
</html>
